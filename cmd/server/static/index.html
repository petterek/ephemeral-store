<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ephemeral Storage</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #222; }
  h1 { margin-bottom: 24px; }
  h2 { margin: 24px 0 12px; }
  form { display: flex; flex-direction: column; gap: 8px; }
  label { font-weight: 600; font-size: 14px; }
  input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
  button { padding: 10px; border: none; border-radius: 4px; background: #0969da; color: #fff; font-size: 14px; cursor: pointer; }
  button:hover { background: #0550ae; }
  .result { margin-top: 12px; padding: 12px; border-radius: 4px; font-family: monospace; white-space: pre-wrap; word-break: break-all; }
  .success { background: #dafbe1; color: #1a7f37; }
  .error { background: #ffebe9; color: #cf222e; }
  hr { margin: 24px 0; border: none; border-top: 1px solid #ddd; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px; border-bottom: 1px solid #ddd; }
  th { font-weight: 600; background: #f6f8fa; }
</style>
</head>
<body>

<h1>Ephemeral Storage</h1>
<p><a href="/docs.html">API Documentation</a></p>

<h2>Store a value</h2>
<form id="insert-form">
  <label for="sender">Sender</label>
  <input id="sender" name="sender" required placeholder="alice">
  <label for="datatype">Data type</label>
  <input id="datatype" name="datatype" required placeholder="password">
  <label for="value">Value</label>
  <input id="value" name="value" required placeholder="super-secret-data">
  <label for="ttl">TTL (seconds)</label>
  <input id="ttl" name="ttl" type="number" min="1" value="60" required>
  <button type="submit">Store</button>
</form>
<div id="insert-result"></div>

<hr>

<h2>Read a value</h2>
<form id="read-form">
  <label for="read-key">Key</label>
  <input id="read-key" name="key" required placeholder="my-secret">
  <button type="submit">Read</button>
</form>
<div id="read-result"></div>

<hr>

<h2>Current storage contents</h2>
<table id="storage-table">
  <thead><tr><th>Key</th><th>Value</th><th>Expires in</th></tr></thead>
  <tbody></tbody>
</table>
<p id="storage-empty" style="color:#666;">Empty</p>

<script>
  const insertForm = document.getElementById('insert-form');
  const insertResult = document.getElementById('insert-result');
  const readForm = document.getElementById('read-form');
  const readResult = document.getElementById('read-result');

  function showResult(el, ok, text) {
    el.textContent = text;
    el.className = 'result ' + (ok ? 'success' : 'error');
  }

  insertForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const sender = insertForm.sender.value;
    const datatype = insertForm.datatype.value;
    const value = insertForm.value.value;
    const ttl = parseInt(insertForm.ttl.value, 10);
    try {
      const res = await fetch('/keys', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sender, datatype, value, ttl }),
      });
      const data = await res.json();
      if (res.status === 201) {
        showResult(insertResult, true, 'Key: ' + data.key + '\nDecoded: ' + atob(data.key));
      } else {
        showResult(insertResult, false, data.error || 'Failed');
      }
    } catch (err) {
      showResult(insertResult, false, err.message);
    }
  });

  readForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const key = readForm.key.value;
    try {
      const res = await fetch('/keys/' + encodeURIComponent(key));
      const data = await res.json();
      if (res.ok) {
        showResult(readResult, true, data.value);
      } else {
        showResult(readResult, false, data.error || 'Not found');
      }
    } catch (err) {
      showResult(readResult, false, err.message);
    }
  });

  // SSE live storage view
  const tbody = document.querySelector('#storage-table tbody');
  const emptyMsg = document.getElementById('storage-empty');
  const table = document.getElementById('storage-table');

  const evtSource = new EventSource('/events');
  evtSource.onmessage = (e) => {
    const entries = JSON.parse(e.data);
    tbody.innerHTML = '';
    if (entries.length === 0) {
      table.style.display = 'none';
      emptyMsg.style.display = 'block';
    } else {
      table.style.display = 'table';
      emptyMsg.style.display = 'none';
      entries.forEach((entry) => {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td>' + esc(entry.key) + '</td><td>' + esc(entry.value) + '</td><td>' + entry.expires_in + 's</td>';
        tbody.appendChild(tr);
      });
    }
  };

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
</script>

</body>
</html>
